<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

  :root{
    --green:#1ba14e;
    --black:#111111;
    --grey:#8e9094;
    --grey2:#37383c;
    --grey-light:#b9bcc0;
    --line:#ededed;
    --blue:#1d5bf0;
  }

  html,body{
    background:#d9d9d9;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--black);
    display:flex;
    justify-content:center;
    overflow-x:hidden;
  }

  .phone{
    width:100%;
    max-width:430px;
    min-height:100vh;
    background:#ffffff;
    position:relative;
    overflow:hidden;
    padding-top:14px;
  }

  /* ---------- status bar ---------- */
  .status{
    height:44px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 22px 0 26px;
    font-size:17px;
    font-weight:600;
  }
  .status .right{ display:flex; align-items:center; gap:7px; }
  .battery{
    width:25px;height:13px;border:1.5px solid #000;border-radius:3px;
    position:relative;display:inline-block;
  }
  .battery::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:6px;background:#000;border-radius:0 2px 2px 0;}
  .battery span{position:absolute;left:1.5px;top:1.5px;bottom:1.5px;right:3.5px;background:#000;border-radius:1px;}

  /* ---------- top header ---------- */
  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:8px 20px 0 22px;
    position:relative;
  }
  .header .title{
    font-size:19px; font-weight:700;
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
  }
  .header .icons{ display:flex; align-items:center; gap:22px; }
  .avatar{
    width:36px;height:36px;border-radius:50%;background:#000;
    display:flex;align-items:center;justify-content:center;
  }
  .ic{ width:28px;height:28px;display:block; }

  /* ---------- portfolio value row ---------- */
  .value-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:6px 22px 16px 22px;
  }
  .pv-label{ display:flex;align-items:center;gap:6px;font-size:15px;color:#000;margin-bottom:2px;}
  .pv-label .info{ width:15px;height:15px; }
  .pv-amount{ font-size:38px;font-weight:700;letter-spacing:-1.3px;line-height:1.05; }

  .totals{ display:flex;align-items:center;gap:14px;padding-top:16px; }
  .totals .labels{ font-size:15px;line-height:1.55;color:#000;text-align:left; }
  .totals .vals{ font-size:15px;line-height:1.55;color:var(--green);text-align:right;white-space:nowrap; }
  .chev{ color:#9a9ca0;font-size:22px;font-weight:300;margin-left:2px; }

  .divider{ height:1px;background:var(--line);width:100%; }

  /* ---------- holdings ---------- */
  .holdings-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:24px 22px 16px 22px;
  }
  .holdings-head h2{ font-size:23px;font-weight:700; }
  .circle-i{
    width:24px;height:24px;border-radius:50%;border:1.5px solid var(--grey-light);
    display:flex;align-items:center;justify-content:center;color:var(--grey-light);
    font-size:14px;font-style:italic;font-family:Georgia,serif;
  }

  .col-head{
    display:grid;
    grid-template-columns:1.35fr 1fr 1fr;
    padding:0 22px 12px 22px;
    color:var(--grey-light);
    font-size:14px;
  }
  .col-head > *, .row > *{ min-width:0; }
  .col-head .c1{ display:flex;align-items:center;gap:5px; }
  .col-head .c2{ display:flex;align-items:center;justify-content:flex-end;gap:3px;padding-right:8px; }
  .col-head .c3{ display:flex;align-items:center;justify-content:flex-end;gap:5px; }
  .sort{ display:inline-flex;flex-direction:column;gap:3px; }
  .sort i{ width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;display:block; }
  .sort .up{ border-bottom:5px solid var(--grey-light); }
  .sort .dn{ border-top:5px solid var(--grey-light); }
  /* active sort indicator |▲| */
  .act{ display:inline-flex;align-items:center;gap:1.5px;margin-left:2px; }
  .act i{ width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:6px solid #111; }
  .act b{ display:inline-block;width:1.6px;height:11px;background:#111; }

  /* ---------- holding rows ---------- */
  .row{
    display:grid;
    grid-template-columns:1.35fr 1fr 1fr;
    align-items:center;
    padding:18px 22px;
    position:relative;
  }
  .row + .row{ border-top:1px solid var(--line); }
  .holdings-list{ border-top:1px solid var(--line); }

  .clock{
    position:absolute;left:3px;top:50%;transform:translateY(-50%);
    width:16px;height:16px;color:#e8821e;
  }

  .inst .tkr{ font-size:18px;font-weight:700; }
  .inst .tkr .ex{ font-size:11px;font-weight:400;color:var(--grey);margin-left:4px;letter-spacing:.3px; }
  .inst .name{ font-size:16px;color:var(--grey2);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }

  .vs{ text-align:right;padding-right:8px; }
  .vs .v{ font-size:20px;font-weight:700; }
  .vs .s{ font-size:16px;color:var(--grey2);margin-top:4px; }

  .pl{ text-align:right; }
  .pl .p{ font-size:20px;font-weight:700;color:var(--green); }
  .pl .pct{ font-size:16px;color:var(--green);margin-top:4px; }

  /* ---------- cash ---------- */
  .cash-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 22px 4px 22px;
    border-top:1px solid var(--line);
  }
  .cash-head .lbl{ font-size:16px;color:var(--grey2); }
  .qmark{
    width:24px;height:24px;border-radius:50%;border:1.5px solid var(--grey-light);
    display:flex;align-items:center;justify-content:center;color:var(--grey-light);font-size:14px;
  }
  .cash-row{
    display:flex;align-items:center;padding:16px 22px 18px 22px;gap:18px;
  }
  .flag-wrap{ position:relative;width:46px;height:31px;flex:none; }
  .flag{ width:46px;height:31px;border-radius:3px;overflow:hidden;display:block;box-shadow:0 0 0 .5px rgba(0,0,0,.08); }
  .check{
    position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;
    background:#23c552;border:2px solid #fff;display:flex;align-items:center;justify-content:center;
  }
  .check svg{ width:11px;height:11px;color:#fff; }
  .cash-info{ flex:1; }
  .cash-info .cur{ font-size:20px;font-weight:700; }
  .cash-info .sub{ font-size:15px;color:var(--grey2);margin-top:2px;white-space:nowrap; }
  .cash-amt{ font-size:21px;font-weight:700;margin-right:14px; }
  .dots{
    width:88px;height:42px;border-radius:21px;background:#e7ebef;
    display:flex;align-items:center;justify-content:center;gap:6px;flex:none;
  }
  .dots i{ width:6px;height:6px;border-radius:50%;background:#a7abb0;display:block; }

  /* ---------- footer powered ---------- */
  .powered{
    display:flex;align-items:center;gap:8px;
    padding:10px 22px 0 22px;
    color:var(--grey-light);font-size:14px;
    border-top:1px solid var(--line);
    padding-top:16px;
  }
  .powered .gfis{ display:flex;align-items:center;gap:4px;font-weight:800;color:#1763c7;font-size:15px;letter-spacing:.2px; }
  .powered .gfis svg{ display:block;width:15px;height:14px; }

  /* ---------- trade button ---------- */
  .trade{
    position:absolute;
    bottom:34px;
    right:24px;
  }
  .trade button{
    background:var(--blue);
    color:#fff;
    border:none;
    border-radius:34px;
    height:64px;
    padding:0 30px 0 26px;
    display:flex;align-items:center;gap:14px;
    font-size:19px;font-weight:600;
    box-shadow:0 8px 20px rgba(29,91,240,.35);
    cursor:pointer;
  }
  .trade svg{ width:30px;height:30px; }
</style>
</head>
<body>
<div class="phone">

  <!-- header -->
  <div class="header">
    <div style="display:flex;align-items:center;">
      <div class="avatar">

      </div>

    </div>
    <div class="icons">

    </div>
  </div>

  <!-- portfolio value -->
  <div class="value-row">

    <div class="totals">

      <div class="chev">&rsaquo;</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- holdings header -->
  <div class="holdings-head">
    <h2>Your Holdings</h2>
    <span class="circle-i">i</span>
  </div>

  <!-- column headers -->
  <div class="col-head">
    <div class="c1">Instrument <span class="sort"><i class="up"></i><i class="dn"></i></span></div>
    <div class="c2">Value/Shares <span class="act"><b></b><i></i><b></b></span></div>
    <div class="c3">Total P&amp;L <span class="sort"><i class="up"></i><i class="dn"></i></span></div>
  </div>

  <!-- holdings list -->
  <div class="holdings-list">
    <div class="row">
      <svg class="clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2" stroke-linecap="round"/><path d="M9 12h6" opacity="0"/></svg>
      <div class="inst">
        <div class="tkr">TSLA<span class="ex">NASDAQ.NMS</span></div>
        <div class="name">TESLA INC</div>
      </div>
      <div class="vs">

        <div class="s">4.8746</div>
      </div>
      <div class="pl">
        <div class="p">64.75</div>
        <div class="pct">3.15%</div>
      </div>
    </div>

    <div class="row">
      <svg class="clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2" stroke-linecap="round"/></svg>
      <div class="inst">
        <div class="tkr">VOO<span class="ex">ARCA</span></div>
        <div class="name">VANGUARD S&amp;P 50&hellip;</div>
      </div>
      <div class="vs">
        <div class="v">$50,196</div>
        <div class="s">72.1739</div>
      </div>
      <div class="pl">
        <div class="p">15,492</div>
        <div class="pct">44.6%</div>
      </div>
    </div>
  </div>

  <!-- cash balances -->
  <div class="cash-head">

  </div>
  <div class="cash-row">

="#fff"/><circle cx="22.80" cy="15.08" r="0.95" fill="#fff"/><circle cx="27.87" cy="15.08" r="0.95" fill="#fff"/><circle cx="2.53" cy="19.38" r="0.95" fill="#fff"/><circle cx="7.60" cy="19.38" r="0.95" fill="#fff"/><circle cx="12.67" cy="19.38" r="0.95" fill="#fff"/><circle cx="17.73" cy="19.38" r="0.95" fill="#fff"/><circle cx="22.80" cy="19.38" r="0.95" fill="#fff"/><circle cx="27.87" cy="19.38" r="0.95" fill="#fff"/></svg>

</div>
</body>
</html>
