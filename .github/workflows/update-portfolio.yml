name: Update portfolio data

on:
  schedule:
    # Every 15 minutes. GitHub may delay/skip scheduled runs under load, so
    # treat this as "best effort", not guaranteed exactly every 15 minutes.
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-portfolio
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch prices and update data
        run: node scripts/update-portfolio.mjs

      - name: Commit updated data
        run: |
          git config user.name "portfolio-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/portfolio.json data/history.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: update portfolio data [skip ci]"
            git push
          fi
