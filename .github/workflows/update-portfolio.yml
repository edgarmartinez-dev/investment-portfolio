name: Update portfolio data

on:
  schedule:
    # Every 15 minutes, offset off the congested :00/:15/:30/:45 marks to
    # improve GitHub's odds of actually running it (scheduled runs are
    # best-effort and GitHub delays/drops them, especially at round times).
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-portfolio
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch prices and update data
        run: node scripts/update-portfolio.mjs

      - name: Commit updated data
        run: |
          git config user.name "portfolio-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/portfolio.json data/history.json
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "chore: update portfolio data [skip ci]"
          # Retry to survive races (manual pushes / overlapping runs); on
          # conflict in the generated data files, our fresh data wins (-X theirs).
          for i in 1 2 3 4 5; do
            if git push; then
              echo "pushed"; exit 0
            fi
            echo "push rejected, syncing with remote (attempt $i)…"
            git pull --rebase -X theirs origin main || true
            sleep $((RANDOM % 4 + 2))
          done
          echo "::error::could not push after retries"; exit 1
